spring:
  application:
    name: wechat-test
  datasource:
    url: jdbc:h2:mem:aidemo-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

app:
  storage:
    upload-dir: target/test-uploads

mybatis:
  configuration:
    map-underscore-to-camel-case: true
